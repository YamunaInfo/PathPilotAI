<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant | PathPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/chat.css" />
  </head>
  <body>
    <header class="topbar glass-card">
      <a href="dashboard.html" class="brand">
        <div class="brand-bubble"><i class="fas fa-compass"></i></div>
        <div>
          <strong>PathPilot AI</strong>
          <span>Process & Document Intelligence</span>
        </div>
      </a>
      <nav class="topnav">
        <a href="dashboard.html">Dashboard</a>
        <a href="chat.html" class="active">AI Assistant</a>
        <a href="profile.html">Profile</a>
      </nav>
    </header>

    <main class="chat-shell">
      <aside class="chat-sidebar glass-card">
        <div class="sidebar-head">
          <h3>Recent Chats</h3>
          <button id="clearChat" class="text-link">Clear</button>
        </div>
        <div id="chatHistory" class="chat-history"></div>
      </aside>

      <section class="chat-panel glass-card">
        <div id="messageArea" class="message-area"></div>
        <div class="suggestions">
          <button class="chip" data-prompt="What documents are required?">What documents are required?</button>
          <button class="chip" data-prompt="Am I eligible?">Am I eligible?</button>
          <button class="chip" data-prompt="What is the application fee?">What is the application fee?</button>
          <button class="chip" data-prompt="Where should I apply?">Where should I apply?</button>
        </div>
        <form id="chatForm" class="composer">
          <input id="chatInput" type="text" placeholder="Ask about any process or document" />
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </section>
    </main>

    <div id="loader" class="loader-overlay">
      <div class="spinner"></div>
    </div>
    <div id="toast"></div>

    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
