<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | PathPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <header class="topbar glass-card">
      <a href="dashboard.html" class="brand">
        <div class="brand-bubble"><i class="fas fa-compass"></i></div>
        <div>
          <strong>PathPilot AI</strong>
          <span>Process & Document Intelligence</span>
        </div>
      </a>
      <nav class="topnav">
        <a href="dashboard.html">Dashboard</a>
        <a href="chat.html">AI Assistant</a>
        <a href="profile.html" class="active">Profile</a>
      </nav>
    </header>

    <main class="page-shell profile-shell">
      <section class="profile-card glass-card">
        <div class="profile-photo">
          <i class="fas fa-user"></i>
        </div>
        <div class="profile-info">
          <h1 id="profileName">Loading profile...</h1>
          <p id="profileEmail"></p>
          <div class="profile-meta">
            <span><i class="fas fa-phone"></i> <span id="profilePhone"></span></span>
            <span><i class="fas fa-map-marker-alt"></i> <span id="profileState"></span></span>
            <span><i class="fas fa-briefcase"></i> <span id="profileOccupation"></span></span>
          </div>
          <div class="profile-actions">
            <button class="btn btn-primary" id="editProfileBtn">Edit Profile</button>
            <button class="btn btn-secondary" id="changePasswordBtn">Change Password</button>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
          </div>
        </div>
      </section>
    </main>

    <div id="loader" class="loader-overlay">
      <div class="spinner"></div>
    </div>
    <div id="toast"></div>

    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
