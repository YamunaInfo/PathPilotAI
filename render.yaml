services:
  - type: web
    name: pathpilot-ai
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        value: pathpilot-dev-secret
      - key: JWT_SECRET_KEY
        value: pathpilot-jwt-secret
      - key: JWT_ALGORITHM
        value: HS256
      - key: MONGO_URI
        value: mongodb+srv://<username>:<password>@<cluster>/<dbname>?retryWrites=true&w=majority
      - key: GEMINI_API_KEY
        value: your_gemini_api_key_here
      - key: CHROMA_PERSIST_DIRECTORY
        value: /tmp/chroma
      - key: CHROMA_COLLECTION_NAME
        value: pathpilot
